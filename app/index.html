<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YMS Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

/* =========================
   🌙 TEMA DARK / LIGHT
========================= */

:root{
  --bg:#08111f;
  --card:#111c2f;
  --text:#eef4ff;
  --muted:#98abc8;
  --primary:#3b82f6;
}

body.light{
  --bg:#f3f6fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* =========================
   LOGIN
========================= */

.login-screen{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  background:var(--card);
  padding:30px;
  border-radius:20px;
  width:320px;
}

.login-box input{
  width:100%;
  margin-bottom:10px;
  padding:10px;
}

.login-box button{
  width:100%;
  padding:12px;
  background:var(--primary);
  border:none;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* =========================
   LAYOUT
========================= */

.app{
  display:grid;
  grid-template-columns:260px 1fr;
}

.sidebar{
  background:#0b1627;
  padding:20px;
}

.menu button{
  width:100%;
  margin-bottom:8px;
  padding:10px;
  border:none;
  background:#13233a;
  color:#fff;
  cursor:pointer;
}

.main{
  padding:20px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
}

/* =========================
   DOCAS MELHORADA
========================= */

.dock-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.dock{
  padding:14px;
  border-radius:12px;
  transition:.2s;
}

.dock.free{
  background:#064e3b;
}

.dock.busy{
  background:#4c1d95;
}

/* =========================
   TOGGLE TEMA
========================= */

.toggle{
  cursor:pointer;
  padding:6px 12px;
  background:#1e293b;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>Login</h2>
    <input id="loginEmail" placeholder="Email">
    <input id="loginSenha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <div id="loginErro"></div>
  </div>
</div>

<!-- APP -->
<div class="app hidden" id="app">

  <aside class="sidebar">
    <h2>YMS</h2>

    <div class="toggle" onclick="toggleTheme()">🌙 Tema</div>

    <div class="menu">
      <button onclick="setView('dashboard')">Dashboard</button>
      <button onclick="setView('agenda')">Agenda</button>
      <button onclick="setView('docas')">Docas</button>
      <button onclick="setView('relatorios')">Resultados</button>
      <button id="menu-admin" onclick="setView('admin')">Admin</button>
    </div>
  </aside>

  <main class="main">

    <!-- DASHBOARD -->
    <section id="view-dashboard">
      <div class="card">Dashboard operacional</div>
    </section>

    <!-- AGENDA -->
    <section id="view-agenda" class="hidden">
      <div class="card">
        Agenda carregada via Excel
      </div>
    </section>

    <!-- DOCAS -->
    <section id="view-docas" class="hidden">
      <div class="card">
        <h2>Docas</h2>
        <div class="dock-grid" id="docasGrid"></div>
      </div>
    </section>

    <!-- RESULTADOS -->
    <section id="view-relatorios" class="hidden">
      <div class="card">
        <h2>Resultados</h2>
        KPIs estilo Power BI
      </div>
    </section>

    <!-- ADMIN -->
    <section id="view-admin" class="hidden">
      <div class="card" id="areaAdmin">
        <h2>Importar Excel</h2>
        <input type="file" id="fileInput">
        <button onclick="importarExcel()">Importar</button>
        <p id="statusUpload"></p>
      </div>
    </section>

  </main>
</div>

<script>

/* =========================
   SUPABASE
========================= */

const sb = supabase.createClient(
 "https://jwprwgptefhvqzdewnfr.supabase.co",
 "SEU_KEY"
);

/* =========================
   LOGIN
========================= */

async function login(){
  const email = loginEmail.value;
  const senha = loginSenha.value;

  const {data,error} = await sb.auth.signInWithPassword({email,password:senha});

  if(error){
    loginErro.innerText = "Erro login";
    return;
  }

  loginScreen.style.display="none";
  app.classList.remove("hidden");
}

/* =========================
   TEMA
========================= */

function toggleTheme(){
  document.body.classList.toggle("light");
}

/* =========================
   NAVEGAÇÃO
========================= */

function setView(v){
  document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
  document.getElementById("view-"+v).classList.remove("hidden");
}

/* =========================
   DOCAS VISUAL
========================= */

function renderDocas(){
  docasGrid.innerHTML = `
    <div class="dock free">Doca 1 Livre</div>
    <div class="dock busy">Doca 2 Ocupada</div>
    <div class="dock free">Doca 3 Livre</div>
    <div class="dock busy">Doca 4 Ocupada</div>
  `;
}

/* =========================
   IMPORTAÇÃO FINAL (CORRIGIDA)
========================= */

async function importarExcel(){

  const file = fileInput.files[0];
  if(!file){ alert("Selecione"); return; }

  const reader = new FileReader();

  reader.onload = async (e)=>{

    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data,{type:"array"});

    let lista = [];

    wb.SheetNames.forEach(nome=>{
      const sheet = wb.Sheets[nome];
      const json = XLSX.utils.sheet_to_json(sheet,{defval:""});

      json.forEach(row=>{
        const dt = row["CARRO"] || row["DT"];
        if(!dt) return;

        lista.push({
          dt:String(dt),
          cliente: row["CLIENTE"],
          transportadora: row["TRANSPORTADOR"],
          status_global:"Agendado"
        });
      });
    });

    const mapa = new Map();
    lista.forEach(i=>mapa.set(i.dt,i));

    const final = [...mapa.values()];

    const {error} = await sb.from("agendas").upsert(final,{onConflict:"dt"});

    if(error){
      alert(error.message);
      return;
    }

    statusUpload.innerText = "Importado com sucesso";
  };

  reader.readAsArrayBuffer(file);
}

/* INIT */
renderDocas();

</script>

</body>
</html>
