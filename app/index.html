<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Logística</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

button {
  padding: 10px 15px;
  background: #3b82f6;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

input {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>🚛 Sistema YMS - Upload Inteligente</h2>

<input type="file" id="fileInput">
<br><br>
<button onclick="importarExcel()">Importar Excel</button>

<p id="statusUpload"></p>

<script>

// ============================
// CONFIG SUPABASE
// ============================
const SUPABASE_URL = "https://jwprwgptefhvqzdewnfr.supabase.co";
const SUPABASE_KEY = "sb_publishable_ePs_koxCzHKOsejBKA3BGA_fj3ENPIp";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Simulação de perfil (se quiser integrar com login depois)
let usuarioPerfil = "admin";


// ============================
// FUNÇÃO PRINCIPAL (UPLOAD)
// ============================
async function importarExcel(){

  if(usuarioPerfil !== "admin"){
    alert("Acesso negado");
    return;
  }

  const file = document.getElementById("fileInput").files[0];
  if(!file){
    alert("Selecione um arquivo");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e){

    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type:'array'});

    let registrosImportacao = [];

    workbook.SheetNames.forEach(nomeAba => {

      const sheet = workbook.Sheets[nomeAba];
      const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });

      json.forEach(row => {

        const dt = String(row["DT"] || row["dt"] || "").trim();
        if(!dt) return;

        registrosImportacao.push({
          dt: dt,
          ordem: row["Ordem"] || row["ordem"] || null,
          remessa: row["Remessa"] || row["remessa"] || null,
          cliente: row["Cliente"] || row["cliente"] || null,
          transportadora: row["Transportadora"] || row["transportadora"] || null,

          data_agenda: normalizarData(row["Data"] || row["data_agenda"]),
          hora_agenda: normalizarHora(row["Hora"] || row["hora_agenda"]),

          tipo_carga: row["Tipo de carga"] || row["tipo_carga"] || null,
          tipo_veiculo: row["Tipo de veículo"] || row["tipo_veiculo"] || null,
          tipo_frete: row["Tipo de frete"] || row["tipo_frete"] || null,
          perfil_carga: row["Perfil de carregamento"] || row["perfil_carga"] || null,

          total_caixas: num(row["Total caixas"] || row["total_caixas"]),
          he: num(row["HE"]),
          ho: num(row["HO"]),
          cubagem: num(row["Cubagem"] || row["metragem_cubica"]),
          tonelagem: num(row["Tonelagem"] || row["tonelagem"]),
          peso: num(row["Peso"] || row["peso"]),

          status_global: "Agendado"
        });

      });

    });

    const { error } = await sb
      .from("agendas")
      .upsert(registrosImportacao, { onConflict: "dt" });

    if(error){
      alert("Erro: " + error.message);
      return;
    }

    document.getElementById("statusUpload").innerText =
      "Importado com sucesso: " + registrosImportacao.length + " registros";

  };

  reader.readAsArrayBuffer(file);
}


// ============================
// FUNÇÕES AUXILIARES
// ============================

function normalizarData(valor){
  if(!valor) return null;

  if(valor instanceof Date){
    return valor.toISOString().split("T")[0];
  }

  if(typeof valor === "number"){
    const excelEpoch = new Date(1899,11,30);
    const data = new Date(excelEpoch.getTime() + valor * 86400000);
    return data.toISOString().split("T")[0];
  }

  return valor;
}

function normalizarHora(valor){
  if(!valor) return null;

  if(typeof valor === "number"){
    const total = Math.round(valor * 86400);
    const h = String(Math.floor(total / 3600)).padStart(2,"0");
    const m = String(Math.floor((total % 3600)/60)).padStart(2,"0");
    return h + ":" + m + ":00";
  }

  return valor;
}

function num(v){
  if(!v) return 0;
  return Number(String(v).replace(",", ".")) || 0;
}

</script>

</body>
</html>
