<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>YMS Logístico Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#0f172a; color:white; }
#login { display:flex; height:100vh; justify-content:center; align-items:center; flex-direction:column; }
#app { display:none; padding:20px; }
input, button { padding:10px; margin:5px; border-radius:5px; border:none; }
button { background:#2563eb; color:white; cursor:pointer; }
.card { background:#1e293b; padding:15px; border-radius:10px; margin-bottom:10px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- SISTEMA -->
<div id="app">

<h2 id="usuarioNome"></h2>
<button onclick="logout()">Sair</button>

<!-- ADMIN -->
<div id="adminArea" class="card">
<h3>Upload de Agenda (Admin)</h3>
<input type="file" id="uploadExcel">
<button onclick="importarExcel()">Importar Excel</button>
</div>

<!-- LISTA -->
<div class="card">
<h3>Agenda</h3>
<table border="1" width="100%" id="listaDT">
<tr>
<th>DT</th>
<th>Cliente</th>
<th>Transportadora</th>
<th>Status</th>
</tr>
</table>
</div>

</div>

<script>
// 🔗 SUPABASE
const SUPABASE_URL = "https://jwprwgptefhvqzdewnfr.supabase.co";
const SUPABASE_KEY = "sb_publishable_ePs_koxCzHKOsejBKA3BGA_fj3ENPIp";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔐 LOGIN
async function login() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const { error } = await supabase.auth.signInWithPassword({ email, password: senha });

    if (error) {
        alert("Erro: " + error.message);
        return;
    }

    location.reload();
}

// 🔓 LOGOUT
async function logout() {
    await supabase.auth.signOut();
    location.reload();
}

// 🔍 USUÁRIO
async function getUser() {
    const { data } = await supabase.auth.getUser();
    return data.user;
}

// 👤 PERFIL
async function getPerfil() {
    const user = await getUser();

    const { data } = await supabase
        .from("usuarios")
        .select("*")
        .eq("id", user.id)
        .single();

    return data;
}

// 🔒 BLOQUEIO
async function verificarLogin() {
    const { data } = await supabase.auth.getSession();

    if (!data.session) {
        document.getElementById("login").style.display = "flex";
        document.getElementById("app").style.display = "none";
    } else {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
    }
}

// 👋 SAUDAÇÃO
function saudacao() {
    const h = new Date().getHours();
    if (h < 12) return "Bom dia";
    if (h < 18) return "Boa tarde";
    return "Boa noite";
}

async function mostrarUsuario() {
    const perfil = await getPerfil();
    document.getElementById("usuarioNome").innerText =
        saudacao() + ", " + perfil.nome;
}

// 🔐 CONTROLE ADMIN
async function aplicarPermissoes() {
    const perfil = await getPerfil();

    if (perfil.perfil !== "admin") {
        document.getElementById("adminArea").style.display = "none";
    }
}

// 📊 CARREGAR AGENDA
async function carregarDTs() {
    const { data } = await supabase
        .from("agendas")
        .select("*")
        .order("hora_agenda");

    const tabela = document.getElementById("listaDT");
    tabela.innerHTML = `
        <tr>
        <th>DT</th>
        <th>Cliente</th>
        <th>Transportadora</th>
        <th>Status</th>
        </tr>
    `;

    data.forEach(d => {
        tabela.innerHTML += `
        <tr>
            <td>${d.dt}</td>
            <td>${d.cliente || ''}</td>
            <td>${d.transportadora || ''}</td>
            <td>${d.status || 'PENDENTE'}</td>
        </tr>`;
    });
}

// 📥 IMPORTAR EXCEL (ADMIN)
async function importarExcel() {

    const perfil = await getPerfil();

    if (perfil.perfil !== "admin") {
        alert("Apenas admin pode importar");
        return;
    }

    const file = document.getElementById("uploadExcel").files[0];

    if (!file) {
        alert("Selecione um arquivo");
        return;
    }

    const reader = new FileReader();

    reader.onload = async function(e) {

        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        for (let row of json) {

            await supabase.from("agendas").upsert({
                dt: row["DT"],
                cliente: row["Cliente"],
                transportadora: row["Transportadora"],
                tipo_carga: row["Tipo de carga"],
                data_agenda: row["Data"],
                hora_agenda: row["Hora"],
                status: "PENDENTE"
            }, { onConflict: "dt" });
        }

        alert("Importado!");
        carregarDTs();
    };

    reader.readAsArrayBuffer(file);
}

// ⚡ REALTIME
supabase
.channel('realtime')
.on('postgres_changes', { event: '*', schema: 'public', table: 'agendas' },
payload => carregarDTs()
)
.subscribe();

// 🚀 START
async function iniciar() {
    await verificarLogin();
    await aplicarPermissoes();
    await mostrarUsuario();
    await carregarDTs();
}

iniciar();

</script>

</body>
</html>
