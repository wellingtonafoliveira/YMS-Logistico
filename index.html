<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>YMS PRO v3</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#0b1220;color:#fff;margin:0}
.hidden{display:none}
.sidebar{width:240px;background:#111827;height:100vh;position:fixed;padding:20px}
.main{margin-left:240px;padding:20px}
button{padding:10px;border:none;border-radius:8px;cursor:pointer}
.card{background:#1f2937;padding:15px;border-radius:12px;margin-bottom:15px}
input,select{padding:8px;border-radius:8px;border:none;width:100%;margin-bottom:8px}
.menu button{display:block;width:100%;margin-bottom:8px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="card">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- SISTEMA -->
<div id="app" class="hidden">

<div class="sidebar">
  <h3 id="boasVindas"></h3>

  <div class="menu">
    <button onclick="view('agenda')">Agenda</button>
    <button onclick="view('separacao')">Separação</button>
    <button onclick="view('expedicao')">Expedição</button>
    <button onclick="view('patio')">Pátio</button>
    <button onclick="view('docas')">Docas</button>
    <button onclick="view('dashboard')">Dashboard</button>
    <button id="btnAdmin" class="hidden" onclick="view('admin')">Admin</button>
  </div>
</div>

<div class="main">

<div id="agenda">
  <div class="card">
    <h2>Nova DT</h2>
    <input id="dt" placeholder="DT">
    <input id="cliente" placeholder="Cliente">
    <button onclick="criar()">Salvar</button>
  </div>
  <div id="lista"></div>
</div>

<div id="admin" class="hidden">
  <div class="card">
    <h2>Criar usuário</h2>
    <input id="nomeU" placeholder="Nome">
    <input id="emailU" placeholder="Email">
    <input id="senhaU" placeholder="Senha">
    <select id="perfilU">
      <option value="operador">Operador</option>
      <option value="admin">Admin</option>
    </select>
    <button onclick="criarUsuario()">Criar</button>
  </div>
</div>

</div>
</div>

<script>
const sb = supabase.createClient("SUA_URL","SUA_KEY")

let user=null

async function login(){
  const {data,error}=await sb.auth.signInWithPassword({
    email:email.value,
    password:senha.value
  })

  if(error)return alert("Erro login")

  user=data.user
  iniciarSistema()
}

async function iniciarSistema(){
  document.getElementById("login").style.display="none"
  document.getElementById("app").classList.remove("hidden")

  const {data}=await sb.from("usuarios").select("*").eq("user_id",user.id).single()

  const hora=new Date().getHours()
  const saudacao=hora<12?"Bom dia":hora<18?"Boa tarde":"Boa noite"

  boasVindas.innerText=`${saudacao}, ${data.nome}`

  if(data.perfil==="admin"){
    btnAdmin.classList.remove("hidden")
  }

  carregar()
}

async function criar(){
  await sb.from("agendas").insert([{
    dt:dt.value,
    cliente:cliente.value
  }])
  carregar()
}

async function carregar(){
  const {data}=await sb.from("agendas").select("*")

  lista.innerHTML=data.map(r=>`
    <div class="card">
      <b>${r.dt}</b> - ${r.cliente}
      <br>Status: ${r.status_global}
    </div>
  `).join("")
}

function view(v){
  document.querySelectorAll(".main > div").forEach(d=>d.classList.add("hidden"))
  document.getElementById(v).classList.remove("hidden")
}

async function criarUsuario(){
  const {data,error}=await sb.auth.signUp({
    email:emailU.value,
    password:senhaU.value
  })

  if(error)return alert("Erro")

  await sb.from("usuarios").insert([{
    user_id:data.user.id,
    nome:nomeU.value,
    email:emailU.value,
    perfil:perfilU.value
  }])

  alert("Usuário criado")
}
</script>

</body>
</html>
