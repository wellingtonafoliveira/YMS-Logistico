<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>YMS - Torre de Controle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white}
header{padding:15px;font-size:20px;background:#020617}
.container{padding:20px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
text-align:center;
}

.board{
display:flex;
gap:10px;
overflow-x:auto;
}

.column{
background:#1e293b;
padding:10px;
border-radius:10px;
min-width:250px;
}

.vehicle{
background:#334155;
padding:10px;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
}

button{
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2563eb;
color:white;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
color:black;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
font-size:12px;
}

th{background:#e2e8f0}

</style>
</head>

<body>

<header>🚛 YMS - Torre de Controle Logística</header>

<div class="container">

<button onclick="carregar()">Atualizar</button>

<div class="grid">
<div class="card">Agendados: <span id="agendado">0</span></div>
<div class="card">Pátio: <span id="patio">0</span></div>
<div class="card">Doca: <span id="doca">0</span></div>
<div class="card">Carregando: <span id="carga">0</span></div>
<div class="card">Finalizados: <span id="final">0</span></div>
</div>

<div class="board">

<div class="column">
<h3>Agendado</h3>
<div id="col-agendado"></div>
</div>

<div class="column">
<h3>Pátio</h3>
<div id="col-patio"></div>
</div>

<div class="column">
<h3>Doca</h3>
<div id="col-doca"></div>
</div>

<div class="column">
<h3>Carregando</h3>
<div id="col-carga"></div>
</div>

<div class="column">
<h3>Finalizado</h3>
<div id="col-final"></div>
</div>

</div>

<table>
<thead>
<tr>
<th>DT</th>
<th>Remessa</th>
<th>Transportadora</th>
<th>Doca</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script>
const SUPABASE_URL = "https://vvazkfynwhrvjteaecim.supabase.co";
const SUPABASE_KEY = "sb_publishable_J2QJP1PedcIIQzkmKSz9CQ_kfMOt23N";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function avancarStatus(status){
if(status==="Agendado") return "No pátio";
if(status==="No pátio") return "Em doca";
if(status==="Em doca") return "Carregando";
if(status==="Carregando") return "Finalizado";
return "Finalizado";
}

async function carregar(){
const { data } = await supabase.from("agendas").select("*");

document.getElementById("col-agendado").innerHTML="";
document.getElementById("col-patio").innerHTML="";
document.getElementById("col-doca").innerHTML="";
document.getElementById("col-carga").innerHTML="";
document.getElementById("col-final").innerHTML="";

let cont = {a:0,p:0,d:0,c:0,f:0};

data.forEach(item=>{

let card = `
<div class="vehicle" onclick="avancar('${item.id}')">
DT: ${item.dt}<br>
${item.transportadora}<br>
🚚 ${item.placa || ""}
</div>
`;

if(item.status==="Agendado"){col("col-agendado",card);cont.a++;}
if(item.status==="No pátio"){col("col-patio",card);cont.p++;}
if(item.status==="Em doca"){col("col-doca",card);cont.d++;}
if(item.status==="Carregando"){col("col-carga",card);cont.c++;}
if(item.status==="Finalizado"){col("col-final",card);cont.f++;}

});

document.getElementById("agendado").innerText=cont.a;
document.getElementById("patio").innerText=cont.p;
document.getElementById("doca").innerText=cont.d;
document.getElementById("carga").innerText=cont.c;
document.getElementById("final").innerText=cont.f;

const tabela = document.getElementById("tabela");
tabela.innerHTML="";

data.forEach(item=>{
tabela.innerHTML += `
<tr>
<td>${item.dt}</td>
<td>${item.remessa}</td>
<td>${item.transportadora}</td>
<td>${item.doca}</td>
<td>${item.status}</td>
<td><button onclick="avancar('${item.id}')">➡️</button></td>
</tr>
`;
});

}

function col(id,html){
document.getElementById(id).innerHTML += html;
}

async function avancar(id){
const { data } = await supabase.from("agendas").select("*").eq("id",id).single();

const novo = avancarStatus(data.status);

await supabase.from("agendas").update({status:novo}).eq("id",id);

carregar();
}

carregar();
</script>

</body>
</html>
