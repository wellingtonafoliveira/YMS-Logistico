<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>YMS Logístico</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white}

.menu{
display:flex;
background:#020617;
padding:10px;
gap:10px;
}

.menu button{
background:#1e293b;
color:white;
border:none;
padding:10px;
cursor:pointer;
}

.active{background:#2563eb}

.page{display:none;padding:20px}
.show{display:block}

.card{background:#1e293b;padding:15px;margin-bottom:10px;border-radius:8px}

input{padding:6px;margin:5px}

</style>
</head>

<body>

<div class="menu">
<button onclick="abrir('agenda')">Agenda</button>
<button onclick="abrir('separacao')">Separação</button>
<button onclick="abrir('expedicao')">Expedição</button>
<button onclick="abrir('patio')">Pátio</button>
<button onclick="abrir('docas')">Docas</button>
<button onclick="abrir('dashboard')">Dashboard</button>
</div>

<!-- AGENDA -->
<div id="agenda" class="page show">
<h2>📅 Agenda Transporte</h2>

<input id="dt" placeholder="DT">
<input id="remessa" placeholder="Remessa">
<input id="transportadora" placeholder="Transportadora">

<button onclick="salvarAgenda()">Salvar</button>

<div id="listaAgenda"></div>
</div>

<!-- SEPARAÇÃO -->
<div id="separacao" class="page">
<h2>📦 Separação</h2>
<div id="listaSeparacao"></div>
</div>

<!-- EXPEDIÇÃO -->
<div id="expedicao" class="page">
<h2>🚛 Expedição</h2>
<div id="listaExpedicao"></div>
</div>

<!-- PÁTIO -->
<div id="patio" class="page">
<h2>🏁 Pátio</h2>
<div id="listaPatio"></div>
</div>

<!-- DOCAS -->
<div id="docas" class="page">
<h2>🧱 Torre de Docas</h2>
<div id="listaDocas"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2>📊 Dashboard</h2>
<div id="indicadores"></div>
</div>

<script>

const supabase = window.supabase.createClient(
"COLE_SUA_URL",
"COLE_SUA_KEY"
);

function abrir(pagina){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
document.getElementById(pagina).classList.add("show");
carregar();
}

async function salvarAgenda(){
await supabase.from("agendas").insert([{
dt:document.getElementById("dt").value,
remessa:document.getElementById("remessa").value,
transportadora:document.getElementById("transportadora").value,
status:"Agendado"
}]);

carregar();
}

async function carregar(){
const { data } = await supabase.from("agendas").select("*");

renderAgenda(data);
renderSeparacao(data);
renderExpedicao(data);
renderPatio(data);
renderDocas(data);
renderDashboard(data);
}

function renderAgenda(data){
let html="";
data.forEach(i=>{
html+=`<div class="card">${i.dt} - ${i.transportadora}</div>`;
});
document.getElementById("listaAgenda").innerHTML=html;
}

function renderSeparacao(data){
let html="";
data.filter(i=>i.status==="Agendado").forEach(i=>{
html+=`<div class="card">${i.dt} <button onclick="mudar('${i.id}','Separação')">Iniciar</button></div>`;
});
document.getElementById("listaSeparacao").innerHTML=html;
}

function renderExpedicao(data){
let html="";
data.filter(i=>i.status==="Separação").forEach(i=>{
html+=`<div class="card">${i.dt} <button onclick="mudar('${i.id}','Expedição')">Enviar</button></div>`;
});
document.getElementById("listaExpedicao").innerHTML=html;
}

function renderPatio(data){
let html="";
data.filter(i=>i.status==="Expedição").forEach(i=>{
html+=`<div class="card">${i.dt} <button onclick="mudar('${i.id}','Pátio')">Chegou</button></div>`;
});
document.getElementById("listaPatio").innerHTML=html;
}

function renderDocas(data){
let html="";
data.filter(i=>i.status==="Pátio").forEach(i=>{
html+=`<div class="card">${i.dt} <button onclick="mudar('${i.id}','Doca')">Doca</button></div>`;
});
document.getElementById("listaDocas").innerHTML=html;
}

function renderDashboard(data){
document.getElementById("indicadores").innerHTML=
`Total: ${data.length}`;
}

async function mudar(id,status){
await supabase.from("agendas").update({status}).eq("id",id);
carregar();
}

carregar();

</script>

</body>
</html>
